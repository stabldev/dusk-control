name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Extract version from tag
        id: get_version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          $version = $env:REF_NAME.TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Update AppxManifest Version
        run: |
          $manifest = [xml](Get-Content "Package.appxmanifest")
          $manifest.Package.Identity.Version = "$env:VERSION.0"
          $manifest.Save("Package.appxmanifest")

      - name: Build MSIX
        run: .\build-msix.ps1

      - name: Retrieve MSIX
        run: |
          $ver = "${{ env.VERSION }}"
          $src = "AppPackages\DuskControl_$ver.0_x64_Test\DuskControl_$ver.0_x64.msix"
          $dst = "DuskControl.v$ver.msix"
          Copy-Item $src $dst

      - name: Build Unpackaged
        run: |
          dotnet publish DuskControl.csproj `
            -c Release `
            -r win-x64 `
            -p:WindowsPackageType=None `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:WindowsAppSDKSelfContained=true

      - name: Compile Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss "/dAppVersion=$env:VERSION"

      - name: Create Portable Zip
        run: |
          $ver = "${{ env.VERSION }}"
          Compress-Archive -Path "bin\Release\net10.0-windows10.0.26100.0\win-x64\publish\*" -DestinationPath "DuskControl.v$ver.portable.zip"

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            DuskControl.v${{ env.VERSION }}.msix
            Output/DuskControl.v${{ env.VERSION }}.exe
            DuskControl.v${{ env.VERSION }}.portable.zip

      - name: Setup MSStore CLI
        uses: microsoft/microsoft-store-apppublisher@v1.2

      - name: Publish to Microsoft Store
        run: |
          msstore reconfigure `
            --tenantId ${{ secrets.PARTNER_CENTER_TENANT_ID }} `
            --sellerId ${{ secrets.PARTNER_CENTER_SELLER_ID }} `
            --clientId ${{ secrets.PARTNER_CENTER_CLIENT_ID }} `
            --clientSecret ${{ secrets.PARTNER_CENTER_CLIENT_SECRET }}

          msstore publish `
            --appId ${{ secrets.STORE_APP_ID }} `
            --path "DuskControl.v$env:VERSION.msix"
