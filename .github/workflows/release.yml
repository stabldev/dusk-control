name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Extract version from tag
        id: get_version
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Update AppxManifest Version
        run: |
          $manifest = [xml](Get-Content "Package.appxmanifest")
          $manifest.Package.Identity.Version = "${{ env.VERSION }}.0"
          $manifest.Save("Package.appxmanifest")

      - name: Build MSIX
        run: .\build-msix.ps1

      - name: Find MSIX
        run: |
          $msix = Get-ChildItem -Path bin/Release -Filter *.msix -Recurse | Select-Object -First 1
          if ($msix) {
            Copy-Item $msix.FullName "DuskControl.v${{ env.VERSION }}.msix"
          } else {
            Write-Error "MSIX package not found."
            exit 1
          }

      - name: Build Unpackaged
        run: dotnet publish DuskControl.csproj -c Release -r win-x64 -p:WindowsPackageType=None --self-contained true -p:PublishSingleFile=true -o publish_output

      - name: Compile Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss "/dAppVersion=${{ env.VERSION }}"

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            DuskControl.v${{ env.VERSION }}.msix
            Output/DuskControl.v${{ env.VERSION }}.exe
          generate_release_notes: true
